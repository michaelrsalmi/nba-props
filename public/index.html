<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sharp Props">
<title>Sharp Props</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #05050e;
  --card:  #0c0c1e;
  --inner: #090916;
  --bdr:   #1c1c38;
  --b2:    #242448;
  --green: #00e87a;
  --blue:  #4da6ff;
  --amber: #ffb800;
  --red:   #ff4d4d;
  --purp:  #a855f7;
  --text:  #f0f4ff;
  --sub:   #8892aa;
  --dim:   #3a4060;
  --D: 'Barlow Condensed', sans-serif;
  --S: 'DM Sans', sans-serif;
}
html,body { background:var(--bg); min-height:100vh; }
body { font-family:var(--S); color:var(--text); padding-bottom:110px; -webkit-tap-highlight-color:transparent; }

/* HEADER */
.hdr {
  position:sticky; top:0; z-index:99;
  background:rgba(5,5,14,.96);
  border-bottom:1px solid var(--bdr);
  padding:16px 20px 13px;
  display:flex; align-items:center; justify-content:space-between;
  backdrop-filter:blur(12px);
}
.hdr-l .eye { font-size:11px; letter-spacing:3px; color:var(--dim); margin-bottom:4px; font-family:var(--D); }
.hdr-l .ttl { font-family:var(--D); font-size:32px; font-weight:900; color:#fff; line-height:1; letter-spacing:1px; }
.hdr-l .ttl em { color:var(--green); font-style:normal; }
.hdr-r { text-align:right; }
.hdr-r .dt { font-size:14px; font-weight:600; color:var(--green); }
.hdr-r .gc { font-size:11px; color:var(--sub); letter-spacing:1px; margin-top:4px; }

/* STATUS */
.sts {
  margin:12px 20px 8px;
  padding:12px 16px; border-radius:12px;
  font-size:12px; letter-spacing:1px; text-align:center; font-family:var(--D);
  font-weight:700;
}
.s-load { background:#0c0c1e; border:1px solid var(--bdr); color:var(--sub); }
.s-live { background:#05180f; border:1px solid #00e87a30; color:var(--green); }
.s-err  { background:#180505; border:1px solid #ff4d4d30; color:var(--red); }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.pulse { animation:pulse 1.5s ease-in-out infinite; }

/* GAMES */
.gl { padding:6px 20px 0; display:flex; flex-direction:column; gap:16px; }

/* GAME CARD */
.gc {
  background:var(--card);
  border:1px solid var(--bdr);
  border-radius:20px; overflow:hidden;
  transition:border-color .3s;
}
.gc.rdy { border-color:#00e87a22; }

/* MATCHUP */
.mu { padding:18px 20px 16px; cursor:pointer; user-select:none; }
.mu-top { display:flex; justify-content:space-between; margin-bottom:14px; }
.mu-top span { font-size:11px; letter-spacing:2px; color:var(--dim); font-family:var(--D); font-weight:700; }
.mu-top .live { color:var(--green); }

.teams { display:grid; grid-template-columns:1fr 80px 1fr; align-items:center; gap:8px; }
.tm { text-align:center; }
.tm-abbr { font-family:var(--D); font-size:42px; font-weight:900; color:#fff; letter-spacing:1px; line-height:1; }
.tm-city { font-size:11px; color:var(--sub); margin-top:4px; letter-spacing:1px; font-weight:500; }
.tm-rec  { font-size:13px; color:var(--dim); margin-top:3px; font-weight:500; }
.vs { text-align:center; }
.vs-at { font-size:22px; color:var(--dim); display:block; margin-bottom:6px; }
.vs-tm { font-size:11px; color:var(--sub); letter-spacing:1px; white-space:nowrap; font-weight:500; }

.mu-foot {
  text-align:center; margin-top:14px;
  font-size:12px; letter-spacing:2px; color:var(--dim);
  padding-top:13px; border-top:1px solid var(--bdr);
  font-family:var(--D); font-weight:700;
}
.mu-foot.rdy { color:var(--green); }

/* BODY */
.gb { border-top:1px solid var(--bdr); }

/* ANALYZE BTN */
.abw { padding:20px; }
.abt {
  display:block; width:100%; text-align:center;
  background:linear-gradient(135deg,#082014 0%,#060d20 100%);
  border:1px solid #00e87a40; border-radius:18px;
  color:var(--green); padding:22px 16px;
  font-family:var(--D); font-size:22px; font-weight:900;
  letter-spacing:3px; cursor:pointer; transition:opacity .15s;
}
.abt:active { opacity:.6; }
.abs { text-align:center; font-size:12px; color:var(--sub); margin-top:10px; letter-spacing:1px; font-weight:500; }

/* LOADING */
.ldn { padding:36px 20px; text-align:center; }
.ldn-ic { font-size:38px; margin-bottom:14px; }
.ldn-tx { font-size:14px; color:var(--green); letter-spacing:3px; animation:pulse 1.5s ease-in-out infinite; font-family:var(--D); font-weight:700; }
.ldn-sx { font-size:12px; color:var(--sub); margin-top:8px; font-weight:500; }

/* TABS */
.tabs { display:flex; border-bottom:1px solid var(--bdr); }
.tb {
  flex:1; background:transparent; border:none;
  border-bottom:3px solid transparent;
  color:var(--sub); padding:15px 8px;
  font-family:var(--D); font-size:16px;
  font-weight:700; letter-spacing:2px; cursor:pointer;
  transition:all .2s;
}
.tb.on { border-bottom-color:var(--green); color:var(--green); }

/* PICKS */
.pks { padding:18px 20px; display:flex; flex-direction:column; gap:14px; }
.sec {
  background:var(--inner); border-radius:14px;
  padding:16px 18px; border-left:4px solid var(--dim);
}
.sec-l { font-size:11px; font-weight:700; letter-spacing:3px; margin-bottom:9px; display:flex; align-items:center; gap:6px; font-family:var(--D); }
.sec-t { font-size:15px; line-height:1.7; color:#c8d0e8; font-weight:400; }
.rbtn {
  background:transparent; border:1px solid var(--bdr);
  border-radius:12px; color:var(--sub); padding:14px;
  font-size:12px; letter-spacing:2px; cursor:pointer;
  font-family:var(--D); font-weight:700; width:100%; margin-top:2px;
  transition:all .15s;
}
.rbtn:active { color:var(--green); border-color:var(--green); }

/* PROPS */
.props { padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
.ph { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
.ph-l { font-size:11px; letter-spacing:3px; color:var(--sub); font-family:var(--D); font-weight:700; }
.ph-b {
  font-size:11px; font-weight:700; letter-spacing:1px;
  background:#060e1c; border:1px solid #1a3050;
  color:var(--blue); border-radius:8px; padding:5px 12px;
}

/* PROP CARD */
.pc {
  background:var(--inner); border-radius:16px;
  border:1px solid var(--b2); padding:18px;
}
.pc.hot  { border-color:#00e87a25; }
.pc.cold { border-color:#ff4d4d20; }
.pc.mid  { border-color:#ffb80020; }

.pc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; gap:10px; }
.pc-pl { font-family:var(--D); font-size:26px; font-weight:900; color:#fff; letter-spacing:.3px; line-height:1.1; }
.pc-tm { font-size:12px; color:var(--sub); letter-spacing:1px; margin-top:4px; font-weight:500; }
.stars { font-size:17px; letter-spacing:-2px; flex-shrink:0; padding-top:2px; }

.pc-line { display:flex; align-items:center; gap:10px; margin-bottom:13px; flex-wrap:wrap; }
.pc-cat {
  font-size:10px; letter-spacing:2px; font-weight:700;
  background:#111130; border:1px solid var(--bdr);
  border-radius:6px; padding:5px 10px; color:var(--sub);
  font-family:var(--D);
}
.pc-num { font-family:var(--D); font-size:26px; font-weight:900; letter-spacing:.5px; }
.n-over  { color:var(--green); }
.n-under { color:var(--red); }
.n-mid   { color:var(--amber); }
.pc-dir {
  font-size:12px; font-weight:700; letter-spacing:1px;
  border-radius:8px; padding:5px 12px; font-family:var(--D);
}
.d-over  { background:#051a0f; color:var(--green); border:1px solid #00e87a30; }
.d-under { background:#1a0505; color:var(--red);   border:1px solid #ff4d4d30; }
.d-mid   { background:#1a1000; color:var(--amber); border:1px solid #ffb80030; }

/* STAT CHIPS */
.chips { display:flex; gap:10px; margin-bottom:13px; }
.chip {
  flex:1; background:#07071a; border:1px solid var(--bdr);
  border-radius:12px; padding:12px 8px; text-align:center;
}
.chip-v { font-family:var(--D); font-size:26px; font-weight:900; line-height:1; }
.chip-l { font-size:10px; letter-spacing:1px; color:var(--sub); margin-top:5px; font-weight:600; font-family:var(--D); }
.cv-g { color:var(--green); }
.cv-a { color:var(--amber); }
.cv-r { color:var(--red); }
.cv-b { color:var(--blue); }

.pc-why { font-size:14px; color:var(--sub); line-height:1.65; font-weight:400; }

/* ERROR CARD */
.err-card {
  background:#180a0a; border:1px solid #ff4d4d30;
  border-radius:14px; padding:16px 18px;
  font-size:14px; color:var(--red); line-height:1.6;
}

/* BOTTOM */
.bot {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(5,5,14,.97); border-top:1px solid var(--bdr);
  padding:12px 20px 30px; text-align:center;
  backdrop-filter:blur(12px);
}
.bot-t { font-size:12px; color:var(--green); font-weight:700; letter-spacing:1px; margin-bottom:5px; font-family:var(--D); }
.bot-s { font-size:12px; color:var(--sub); font-weight:500; }
.bot-s b { color:#c8d0e8; }

.disc { text-align:center; padding:22px 20px 10px; font-size:10px; color:#1a2030; letter-spacing:2px; font-family:var(--D); }

/* EMPTY */
.empty { text-align:center; padding:60px 24px; }
.e-ic { font-size:52px; margin-bottom:18px; }
.e-t { font-family:var(--D); font-size:26px; color:var(--sub); letter-spacing:2px; font-weight:900; }
.e-s { font-size:14px; color:var(--dim); margin-top:12px; line-height:1.6; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="eye">NBA · FANDUEL PROPS</div>
    <div class="ttl">SHARP <em>+</em> PROPS</div>
  </div>
  <div class="hdr-r">
    <div class="dt" id="hdrDate">—</div>
    <div class="gc" id="hdrGames">LOADING...</div>
  </div>
</div>

<div class="sts s-load pulse" id="sts">FETCHING TODAY'S GAMES...</div>
<div class="gl" id="gl"></div>
<div class="disc">FOR ENTERTAINMENT PURPOSES ONLY · NOT FINANCIAL ADVICE</div>

<div class="bot">
  <div class="bot-t">📌 ADD TO HOME SCREEN</div>
  <div class="bot-s">Safari: <b>Share ↑</b> → <b>Add to Home Screen</b></div>
</div>

<script>
let games = [];
const S = {};

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('hdrDate').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  loadGames();
});

async function loadGames() {
  setSts('load','FETCHING TODAY\'S GAMES...',true);
  try {
    const r = await fetch('/.netlify/functions/api/schedule');
    if (!r.ok) throw new Error('Schedule fetch failed');
    const d = await r.json();
    games = d.games || [];

    if (!games.length) {
      setSts('err','NO NBA GAMES TODAY — CHECK BACK TOMORROW');
      document.getElementById('gl').innerHTML = `
        <div class="empty">
          <div class="e-ic">🏀</div>
          <div class="e-t">NO GAMES TODAY</div>
          <div class="e-s">Check back tomorrow.</div>
        </div>`;
      document.getElementById('hdrGames').textContent = '0 GAMES';
      return;
    }

    games.forEach(g => { S[g.id] = { open:false, loading:false, data:null, tab:'props', error:null }; });
    document.getElementById('hdrGames').textContent = `${games.length} GAMES`;
    setSts('live', `✓ ${games.length} GAMES TODAY  ·  TAP ANY GAME`);
    render();
  } catch(e) {
    setSts('err','FAILED TO LOAD — RETRYING...',true);
    setTimeout(loadGames, 4000);
  }
}

function render() {
  document.getElementById('gl').innerHTML = games.map((g,i) => card(g,i)).join('');
}

function card(g, i) {
  const s = S[g.id];
  const isLive = g.status && !['Scheduled','Final'].includes(g.status);
  return `
  <div class="gc ${s.data?'rdy':''}" id="gc-${g.id}">
    <div class="mu" onclick="tog('${g.id}')">
      <div class="mu-top">
        <span>GAME ${i+1}</span>
        <span class="${isLive?'live':''}">${isLive ? '● '+g.status.toUpperCase() : g.time}</span>
      </div>
      <div class="teams">
        <div class="tm">
          <div class="tm-abbr">${g.awayAbbr}</div>
          <div class="tm-city">${cityOf(g.awayTeam)}</div>
          ${g.awayRecord ? `<div class="tm-rec">${g.awayRecord}</div>` : ''}
        </div>
        <div class="vs">
          <span class="vs-at">@</span>
          <span class="vs-tm">${g.time.replace(':00 ',' ')}</span>
        </div>
        <div class="tm">
          <div class="tm-abbr">${g.homeAbbr}</div>
          <div class="tm-city">${cityOf(g.homeTeam)}</div>
          ${g.homeRecord ? `<div class="tm-rec">${g.homeRecord}</div>` : ''}
        </div>
      </div>
      <div class="mu-foot ${s.data?'rdy':''}">
        ${s.data
          ? '✓ PROPS READY  ·  TAP TO ' + (s.open ? 'COLLAPSE' : 'VIEW')
          : s.open ? '▲ COLLAPSE' : '▼ TAP TO GET PROPS'}
      </div>
    </div>
    ${s.open ? body(g) : ''}
  </div>`;
}

function body(g) {
  const s = S[g.id];

  if (s.loading) return `
    <div class="gb">
      <div class="ldn">
        <div class="ldn-ic">⚡</div>
        <div class="ldn-tx">CRUNCHING STATS...</div>
        <div class="ldn-sx">last 10 games · H2H · matchup splits</div>
      </div>
    </div>`;

  if (!s.data) return `
    <div class="gb">
      <div class="abw">
        <button class="abt" onclick="analyze('${g.id}')">🏀 GET PROPS</button>
        <div class="abs">POINTS · REBOUNDS · ASSISTS · 3PM  ·  LAST 10 + H2H STATS</div>
      </div>
    </div>`;

  const d = s.data;
  const t = s.tab;

  const SEC = (icon,lbl,col,txt) => !txt ? '' : `
    <div class="sec" style="border-left-color:${col}">
      <div class="sec-l" style="color:${col}">${icon} ${lbl}</div>
      <div class="sec-t">${x(txt)}</div>
    </div>`;

  const picksHTML = `
    <div class="pks">
      ${SEC('🎯','BEST BET','#00e87a', d.bestBet)}
      ${SEC('📈','10-GAME TREND','#4da6ff', d.trend)}
      ${SEC('⚡','SITUATIONAL EDGE','#a855f7', d.edge)}
      ${SEC('⚠️','RISK FACTOR','#ff4d4d', d.risk)}
      ${SEC('🔪','SHARP TAKE','#00e87a', d.sharpTake)}
      <button class="rbtn" onclick="analyze('${g.id}')">↺ REFRESH ANALYSIS</button>
    </div>`;

  const propList = d.props || [];
  const propsHTML = `
    <div class="props">
      <div class="ph">
        <span class="ph-l">ALT LINES TO TARGET</span>
        <span class="ph-b">🎮 FANDUEL</span>
      </div>
      ${propList.length
        ? propList.map(p => propCard(p)).join('')
        : `<div class="err-card">No props returned — tap Refresh Props to retry.</div>`}
      <button class="rbtn" onclick="analyze('${g.id}')">↺ REFRESH PROPS</button>
    </div>`;

  return `
    <div class="gb">
      <div class="tabs">
        <button class="tb ${t==='props'?'on':''}" onclick="stab('${g.id}','props')">🏀 ALT PROPS</button>
        <button class="tb ${t==='picks'?'on':''}" onclick="stab('${g.id}','picks')">🎯 GAME PICKS</button>
      </div>
      ${t==='props' ? propsHTML : picksHTML}
    </div>`;
}

function propCard(p) {
  const over  = p.direction === 'OVER';
  const under = p.direction === 'UNDER';
  const cls   = over ? 'hot' : under ? 'cold' : 'mid';
  const nCls  = over ? 'n-over' : under ? 'n-under' : 'n-mid';
  const dCls  = over ? 'd-over' : under ? 'd-under' : 'd-mid';
  const l10   = parseInt(p.last10) || 0;
  const h2h   = parseInt(p.h2h) || 0;
  const lc    = l10 >= 8 ? 'cv-g' : l10 >= 6 ? 'cv-a' : 'cv-r';
  const hc    = h2h >= 4 ? 'cv-g' : h2h >= 3 ? 'cv-a' : 'cv-r';
  const stars = '⭐'.repeat(Math.min(5, Math.max(1, parseInt(p.confidence) || 3)));

  return `
  <div class="pc ${cls}">
    <div class="pc-top">
      <div>
        <div class="pc-pl">${x(p.player)}</div>
        <div class="pc-tm">${x(p.team)} · ${x(p.matchup)}</div>
      </div>
      <div class="stars">${stars}</div>
    </div>
    <div class="pc-line">
      <span class="pc-cat">${x(p.category)}</span>
      <span class="pc-num ${nCls}">${x(p.direction)} ${x(p.line)}</span>
      <span class="pc-dir ${dCls}">${x(p.direction)}</span>
    </div>
    <div class="chips">
      <div class="chip">
        <div class="chip-v ${lc}">${l10}/10</div>
        <div class="chip-l">LAST 10</div>
      </div>
      <div class="chip">
        <div class="chip-v ${hc}">${h2h}/5</div>
        <div class="chip-l">H2H (L5)</div>
      </div>
      <div class="chip">
        <div class="chip-v cv-b">${x(p.avg)}</div>
        <div class="chip-l">SEASON AVG</div>
      </div>
    </div>
    <div class="pc-why">${x(p.reason)}</div>
  </div>`;
}

async function analyze(id) {
  const g = games.find(g => g.id === id);
  if (!g || S[id].loading) return;
  S[id].loading = true;
  S[id].open = true;
  S[id].tab = 'props';
  render();

  try {
    const r = await fetch('/.netlify/functions/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game: g })
    });
    const text = await r.text();
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${text}`);
    const json = JSON.parse(text);
    if (!json || typeof json !== 'object') throw new Error('Invalid response');
    S[id].data = json;
  } catch(e) {
    console.error('Analyze error:', e);
    S[id].data = {
      bestBet: `Error: ${e.message} — tap Refresh to retry.`,
      trend:'', edge:'', risk:'', sharpTake:'',
      props:[]
    };
  }

  S[id].loading = false;
  render();
}

function tog(id)   { S[id].open = !S[id].open; render(); }
function stab(id,t){ S[id].tab = t; render(); }
function setSts(t,m,p=false) {
  const e = document.getElementById('sts');
  e.className = `sts s-${t}${p?' pulse':''}`;
  e.textContent = m;
}
function cityOf(name) {
  const parts = name.trim().split(' ');
  return parts.length > 1 ? parts.slice(0,-1).join(' ') : name;
}
function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
