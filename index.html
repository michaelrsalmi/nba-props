<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sharp Props">
<title>Sharp Props</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #060610;
  --card:   #0e0e20;
  --inner:  #0b0b1a;
  --border: #1a1a30;
  --b2:     #222240;
  --green:  #3dff8f;
  --blue:   #5aafff;
  --amber:  #ffbe3d;
  --red:    #ff5a5a;
  --purple: #b57bff;
  --text:   #dde3f0;
  --muted:  #5a6480;
  --dim:    #2a3050;
  --D: 'Barlow Condensed', sans-serif;
  --M: 'DM Mono', monospace;
}
html, body { background: var(--bg); min-height: 100vh; }
body { font-family: var(--M); color: var(--text); padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }

/* HEADER */
.hdr {
  position: sticky; top: 0; z-index: 99;
  background: rgba(6,6,16,.97);
  border-bottom: 1px solid var(--border);
  padding: 16px 18px 13px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(10px);
}
.hdr-l .eye { font-size: 10px; letter-spacing: 4px; color: var(--muted); margin-bottom: 4px; }
.hdr-l .ttl { font-family: var(--D); font-size: 30px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: .5px; }
.hdr-l .ttl em { color: var(--green); font-style: normal; }
.hdr-r { text-align: right; }
.hdr-r .dt { font-size: 13px; font-weight: 500; color: var(--green); letter-spacing: .5px; }
.hdr-r .gc { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }

/* STATUS */
.sts {
  margin: 12px 18px 6px;
  padding: 11px 16px; border-radius: 10px;
  font-size: 11px; letter-spacing: 2px; text-align: center; font-family: var(--M);
}
.s-load { background: #0e0e20; border: 1px solid var(--border); color: var(--muted); }
.s-live { background: #061a0f; border: 1px solid #3dff8f30; color: var(--green); }
.s-err  { background: #1a0606; border: 1px solid #ff5a5a30; color: var(--red); }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.pulse { animation: pulse 1.5s ease-in-out infinite; }

/* GAME LIST */
.gl { padding: 6px 18px 0; display: flex; flex-direction: column; gap: 14px; }

/* GAME CARD */
.gc {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px; overflow: hidden;
  transition: border-color .3s;
}
.gc.rdy { border-color: #3dff8f20; }

/* MATCHUP */
.mu { padding: 16px 18px 14px; cursor: pointer; user-select: none; }
.mu-top { display: flex; justify-content: space-between; margin-bottom: 12px; }
.mu-top span { font-size: 10px; letter-spacing: 3px; color: var(--muted); }
.mu-top .live-dot { color: var(--green); }

.teams { display: grid; grid-template-columns: 1fr 90px 1fr; align-items: center; gap: 8px; }
.tm { text-align: center; }
.tm-abbr { font-family: var(--D); font-size: 38px; font-weight: 900; color: #fff; letter-spacing: 1px; line-height: 1; }
.tm-city { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }
.tm-rec  { font-size: 11px; color: var(--dim); margin-top: 2px; }

.vs { text-align: center; }
.vs-at { font-size: 20px; color: var(--dim); display: block; margin-bottom: 5px; }
.vs-tm { font-size: 10px; color: var(--muted); letter-spacing: 1px; white-space: nowrap; }

.mu-foot {
  text-align: center; margin-top: 13px;
  font-size: 11px; letter-spacing: 2px; color: var(--muted);
  padding-top: 12px; border-top: 1px solid var(--border);
}
.mu-foot.rdy { color: var(--green); }

/* BODY */
.gb { border-top: 1px solid var(--border); }

/* ANALYZE BTN */
.abw { padding: 18px; }
.abt {
  display: block; width: 100%; text-align: center;
  background: linear-gradient(135deg, #0a2016 0%, #080f20 100%);
  border: 1px solid #3dff8f40; border-radius: 16px;
  color: var(--green); padding: 20px 16px;
  font-family: var(--D); font-size: 20px; font-weight: 900;
  letter-spacing: 3px; cursor: pointer; transition: opacity .15s;
}
.abt:active { opacity: .6; }
.abs { text-align: center; font-size: 10px; color: var(--muted); margin-top: 9px; letter-spacing: 2px; }

/* LOADING */
.ldn { padding: 32px 18px; text-align: center; }
.ldn-ic { font-size: 34px; margin-bottom: 12px; }
.ldn-tx { font-size: 12px; color: var(--green); letter-spacing: 3px; animation: pulse 1.5s ease-in-out infinite; }
.ldn-sx { font-size: 10px; color: var(--muted); margin-top: 6px; }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); }
.tb {
  flex: 1; background: transparent; border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted); padding: 14px 8px;
  font-family: var(--D); font-size: 15px;
  font-weight: 700; letter-spacing: 2px; cursor: pointer;
  transition: all .2s;
}
.tb.on { border-bottom-color: var(--green); color: var(--green); }

/* PICKS */
.pks { padding: 16px 18px; display: flex; flex-direction: column; gap: 13px; }
.sec {
  background: var(--inner); border-radius: 12px;
  padding: 14px 16px; border-left: 3px solid var(--dim);
}
.sec-l { font-size: 10px; font-weight: 500; letter-spacing: 3px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.sec-t { font-size: 14px; line-height: 1.7; color: #b0bbd0; }
.rbtn {
  background: transparent; border: 1px solid var(--border);
  border-radius: 10px; color: var(--muted); padding: 13px;
  font-size: 11px; letter-spacing: 2px; cursor: pointer;
  font-family: var(--M); width: 100%; margin-top: 2px;
  transition: all .15s;
}
.rbtn:active { color: var(--green); border-color: var(--green); }

/* PROPS */
.props { padding: 14px 18px; display: flex; flex-direction: column; gap: 12px; }
.ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.ph-l { font-size: 10px; letter-spacing: 3px; color: var(--muted); }
.ph-b {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  background: #060f1e; border: 1px solid #1a3050;
  color: var(--blue); border-radius: 6px; padding: 4px 10px;
}

/* PROP CARD */
.pc {
  background: var(--inner); border-radius: 14px;
  border: 1px solid var(--b2); padding: 15px 16px;
}
.pc.hot  { border-color: #3dff8f28; }
.pc.cold { border-color: #ff5a5a22; }
.pc.mid  { border-color: #ffbe3d22; }

.pc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
.pc-pl { font-family: var(--D); font-size: 22px; font-weight: 900; color: #fff; letter-spacing: .3px; line-height: 1.1; }
.pc-tm { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }
.stars { font-size: 15px; letter-spacing: -2px; flex-shrink: 0; padding-top: 2px; }

.pc-line { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; flex-wrap: wrap; }
.pc-cat {
  font-size: 9px; letter-spacing: 2px; font-weight: 500;
  background: #131325; border: 1px solid var(--border);
  border-radius: 5px; padding: 4px 8px; color: var(--muted);
}
.pc-num { font-family: var(--D); font-size: 22px; font-weight: 900; letter-spacing: .5px; }
.n-over  { color: var(--green); }
.n-under { color: var(--red); }
.n-mid   { color: var(--amber); }
.pc-dir {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  border-radius: 6px; padding: 4px 10px;
}
.d-over  { background: #0a2016; color: var(--green); border: 1px solid #3dff8f30; }
.d-under { background: #1a0606; color: var(--red);   border: 1px solid #ff5a5a30; }
.d-mid   { background: #1a1006; color: var(--amber); border: 1px solid #ffbe3d30; }

/* STAT CHIPS */
.chips { display: flex; gap: 8px; margin-bottom: 11px; }
.chip {
  flex: 1; background: #0a0a18; border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 8px; text-align: center;
}
.chip-v { font-family: var(--D); font-size: 22px; font-weight: 900; line-height: 1; }
.chip-l { font-size: 9px; letter-spacing: 1px; color: var(--muted); margin-top: 4px; }
.cv-g { color: var(--green); }
.cv-a { color: var(--amber); }
.cv-r { color: var(--red); }
.cv-b { color: var(--blue); }

.pc-why { font-size: 13px; color: #7a8aa0; line-height: 1.6; }

/* BOTTOM */
.bot {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(6,6,16,.97); border-top: 1px solid var(--border);
  padding: 11px 18px 28px; text-align: center;
  backdrop-filter: blur(10px);
}
.bot-t { font-size: 11px; color: var(--green); font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
.bot-s { font-size: 11px; color: var(--muted); }
.bot-s b { color: #94a3b8; }

.disc { text-align: center; padding: 20px 18px 8px; font-size: 9px; color: #1a2030; letter-spacing: 2px; }

/* EMPTY */
.empty { text-align: center; padding: 60px 24px; }
.e-ic { font-size: 50px; margin-bottom: 16px; }
.e-t { font-family: var(--D); font-size: 24px; color: var(--muted); letter-spacing: 2px; }
.e-s { font-size: 12px; color: var(--dim); margin-top: 10px; line-height: 1.6; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="eye">NBA · FANDUEL PROPS</div>
    <div class="ttl">SHARP <em>+</em> PROPS</div>
  </div>
  <div class="hdr-r">
    <div class="dt" id="hdrDate">—</div>
    <div class="gc" id="hdrGames">LOADING...</div>
  </div>
</div>

<div class="sts s-load pulse" id="sts">FETCHING TODAY'S GAMES...</div>

<div class="gl" id="gl"></div>

<div class="disc">FOR ENTERTAINMENT PURPOSES ONLY · NOT FINANCIAL ADVICE</div>

<div class="bot">
  <div class="bot-t">📌 ADD TO HOME SCREEN</div>
  <div class="bot-s">Safari: <b>Share ↑</b> → <b>Add to Home Screen</b></div>
</div>

<script>
let games = [];
const S = {};

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('hdrDate').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  loadGames();
});

async function loadGames() {
  setSts('load','FETCHING TODAY\'S GAMES...',true);
  try {
    const r = await fetch('/api/schedule');
    if (!r.ok) throw new Error('Schedule fetch failed');
    const d = await r.json();
    games = d.games || [];

    if (!games.length) {
      setSts('err','NO NBA GAMES TODAY — CHECK BACK TOMORROW');
      document.getElementById('gl').innerHTML = `
        <div class="empty">
          <div class="e-ic">🏀</div>
          <div class="e-t">NO GAMES TODAY</div>
          <div class="e-s">Check back tomorrow for the next slate.</div>
        </div>`;
      document.getElementById('hdrGames').textContent = '0 GAMES';
      return;
    }

    games.forEach(g => { S[g.id] = { open:false, loading:false, data:null, tab:'props' }; });
    document.getElementById('hdrGames').textContent = `${games.length} GAMES`;
    setSts('live',`✓ ${games.length} GAMES TODAY  ·  TAP ANY GAME FOR PROPS`);
    render();
  } catch(e) {
    setSts('err','FAILED TO LOAD — RETRYING...',true);
    setTimeout(loadGames, 4000);
  }
}

function render() {
  document.getElementById('gl').innerHTML = games.map((g,i) => card(g,i)).join('');
}

function card(g, i) {
  const s = S[g.id];
  const isLive = g.status && !['Scheduled','Final'].includes(g.status);
  return `
  <div class="gc ${s.data?'rdy':''}" id="gc-${g.id}">
    <div class="mu" onclick="tog('${g.id}')">
      <div class="mu-top">
        <span>GAME ${i+1}</span>
        <span class="${isLive?'live-dot':''}">${isLive ? '● '+g.status.toUpperCase() : g.time}</span>
      </div>
      <div class="teams">
        <div class="tm">
          <div class="tm-abbr">${g.awayAbbr}</div>
          <div class="tm-city">${cityOf(g.awayTeam)}</div>
          ${g.awayRecord?`<div class="tm-rec">${g.awayRecord}</div>`:''}
        </div>
        <div class="vs">
          <span class="vs-at">@</span>
          <span class="vs-tm">${g.time.replace(':00','')}</span>
        </div>
        <div class="tm">
          <div class="tm-abbr">${g.homeAbbr}</div>
          <div class="tm-city">${cityOf(g.homeTeam)}</div>
          ${g.homeRecord?`<div class="tm-rec">${g.homeRecord}</div>`:''}
        </div>
      </div>
      <div class="mu-foot ${s.data?'rdy':''}">
        ${s.data
          ? '✓ PROPS READY  ·  TAP TO '+(s.open?'COLLAPSE':'VIEW')
          : s.open ? '▲ COLLAPSE' : '▼ TAP FOR PROPS'}
      </div>
    </div>
    ${s.open ? body(g) : ''}
  </div>`;
}

function body(g) {
  const s = S[g.id];
  if (s.loading) return `
    <div class="gb">
      <div class="ldn">
        <div class="ldn-ic">⚡</div>
        <div class="ldn-tx">CRUNCHING STATS...</div>
        <div class="ldn-sx">last 10 · H2H · matchup splits</div>
      </div>
    </div>`;

  if (!s.data) return `
    <div class="gb">
      <div class="abw">
        <button class="abt" onclick="analyze('${g.id}')">🏀 GET PROPS</button>
        <div class="abs">POINTS · REBOUNDS · ASSISTS · 3PM  ·  LAST 10 + H2H</div>
      </div>
    </div>`;

  const d = s.data;
  const t = s.tab;

  const SEC = (icon,lbl,col,txt) => !txt ? '' : `
    <div class="sec" style="border-left-color:${col}">
      <div class="sec-l" style="color:${col}">${icon} ${lbl}</div>
      <div class="sec-t">${x(txt)}</div>
    </div>`;

  const picksHTML = `
    <div class="pks">
      ${SEC('🎯','BEST BET','#3dff8f',d.bestBet)}
      ${SEC('📈','10-GAME TREND','#5aafff',d.trend)}
      ${SEC('⚡','SITUATIONAL EDGE','#b57bff',d.edge)}
      ${SEC('⚠️','RISK FACTOR','#ff5a5a',d.risk)}
      ${SEC('🔪','SHARP TAKE','#3dff8f',d.sharpTake)}
      <button class="rbtn" onclick="analyze('${g.id}')">↺ REFRESH ANALYSIS</button>
    </div>`;

  const propsHTML = `
    <div class="props">
      <div class="ph">
        <span class="ph-l">ALT LINES TO TARGET</span>
        <span class="ph-b">🎮 FANDUEL</span>
      </div>
      ${(d.props||[]).map(p => propCard(p)).join('')}
      <button class="rbtn" onclick="analyze('${g.id}')">↺ REFRESH PROPS</button>
    </div>`;

  return `
    <div class="gb">
      <div class="tabs">
        <button class="tb ${t==='props'?'on':''}" onclick="stab('${g.id}','props')">🏀 ALT PROPS</button>
        <button class="tb ${t==='picks'?'on':''}" onclick="stab('${g.id}','picks')">🎯 GAME PICKS</button>
      </div>
      ${t==='props' ? propsHTML : picksHTML}
    </div>`;
}

function propCard(p) {
  const over  = p.direction === 'OVER';
  const under = p.direction === 'UNDER';
  const cls   = over ? 'hot' : under ? 'cold' : 'mid';
  const nCls  = over ? 'n-over' : under ? 'n-under' : 'n-mid';
  const dCls  = over ? 'd-over' : under ? 'd-under' : 'd-mid';

  const l10 = parseInt(p.last10)||0;
  const h2h = parseInt(p.h2h)||0;
  const lc = l10>=8?'cv-g':l10>=6?'cv-a':'cv-r';
  const hc = h2h>=4?'cv-g':h2h>=3?'cv-a':'cv-r';

  const stars = '⭐'.repeat(Math.min(5,Math.max(1,p.confidence||3)));

  return `
  <div class="pc ${cls}">
    <div class="pc-top">
      <div>
        <div class="pc-pl">${x(p.player)}</div>
        <div class="pc-tm">${x(p.team)} · ${x(p.matchup)}</div>
      </div>
      <div class="stars">${stars}</div>
    </div>
    <div class="pc-line">
      <span class="pc-cat">${x(p.category)}</span>
      <span class="pc-num ${nCls}">${x(p.direction)} ${x(p.line)}</span>
      <span class="pc-dir ${dCls}">${x(p.direction)}</span>
    </div>
    <div class="chips">
      <div class="chip">
        <div class="chip-v ${lc}">${l10}/10</div>
        <div class="chip-l">LAST 10</div>
      </div>
      <div class="chip">
        <div class="chip-v ${hc}">${h2h}/5</div>
        <div class="chip-l">H2H (L5)</div>
      </div>
      <div class="chip">
        <div class="chip-v cv-b">${x(p.avg)}</div>
        <div class="chip-l">SEASON AVG</div>
      </div>
    </div>
    <div class="pc-why">${x(p.reason)}</div>
  </div>`;
}

async function analyze(id) {
  const g = games.find(g => g.id === id);
  if (!g || S[id].loading) return;
  S[id].loading = true; S[id].open = true; S[id].tab = 'props';
  render();
  try {
    const r = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game: g })
    });
    if (!r.ok) throw new Error(`API ${r.status}`);
    S[id].data = await r.json();
  } catch(e) {
    S[id].data = { bestBet:'Error — tap refresh to retry.', trend:'', edge:'', risk:'', sharpTake:'', props:[] };
  }
  S[id].loading = false;
  render();
}

function tog(id)  { S[id].open = !S[id].open; render(); }
function stab(id,t){ S[id].tab = t; render(); }
function setSts(t,m,p=false) {
  const e = document.getElementById('sts');
  e.className = `sts s-${t}${p?' pulse':''}`;
  e.textContent = m;
}
function cityOf(name) {
  const parts = name.split(' ');
  return parts.length > 1 ? parts.slice(0,-1).join(' ').toUpperCase() : name.toUpperCase();
}
function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
